name: Bug Report
description: Something broke, froze, leaked, or did not match what CueForge promised.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing CueForge. Do not paste passwords, phone numbers, DOBs, emails, recovery codes, raw device IDs, full Windows paths, or private screenshots.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Say what you clicked, what you expected, and what actually happened.
      placeholder: I opened Self Test, clicked Run, then...
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: CueForge page or feature
      placeholder: Self Test, Auto Detect, Mic Lab, Report Lab, EQ Studio...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Redacted setup summary
      description: Paste the redacted setup/import summary or say if you could not generate one.
    validations:
      required: false
  - type: textarea
    id: report
    attributes:
      label: Report Lab packet
      description: Paste redacted Report Lab JSON if available.
      render: json
    validations:
      required: false
