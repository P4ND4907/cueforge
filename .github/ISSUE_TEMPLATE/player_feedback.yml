name: Player Feedback
description: One real test session, one useful note about what changed.
title: "[Feedback]: "
labels: ["player-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Honest feedback beats hype. If CueForge made something worse, say that plainly.
  - type: input
    id: game
    attributes:
      label: Game and mode
      placeholder: Tarkov raid, Siege ranked, COD Warzone, CS2, Valorant...
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Imported or auto-detected setup summary
      description: Paste the redacted setup summary from CueForge, or describe what the app could not detect.
    validations:
      required: false
  - type: dropdown
    id: result
    attributes:
      label: What changed?
      options:
        - Better
        - Worse
        - Mixed
        - No clear change
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: What did you notice in-game?
      description: Footsteps, direction, comms, mic clarity, fatigue, harshness, mud, timing, or anything confusing.
    validations:
      required: true
  - type: textarea
    id: packet
    attributes:
      label: Player Trial or Beta Check-in packet
      description: Paste the exported packet if you have it.
      render: json
    validations:
      required: false
